<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Rouge FM</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
        #ecran-mdp { background-color: #d32f2f; color: white; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #ecran-mdp input { padding: 10px; font-size: 16px; margin: 10px; text-align: center; }
        #ecran-mdp button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: white; color: #d32f2f; border: none; font-weight: bold; }
        #contenu-principal { display: none; padding: 20px; max-width: 800px; margin: auto; background: white; min-height: 100vh; }
        .boite-priorites { background: #ffebee; border-left: 5px solid #d32f2f; padding: 15px; margin-bottom: 30px; }
        .boite-priorites h2 { color: #b71c1c; margin-top: 0; }
        .boite-priorites li { font-size: 1.2em; font-weight: bold; margin-bottom: 10px; }
        .boite-spectacles h3 { color: #d32f2f; margin-bottom: 5px; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        .boite-spectacles li { margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="ecran-mdp">
        <h1>🎙️ Accès Studio Rouge</h1>
        <input type="password" id="pwd" placeholder="Mot de passe">
        <button onclick="verifierMdp()">Entrer</button>
    </div>

    <div id="contenu-principal">
        <h1 style="text-align: center;">Outil Animateurs - Rouge FM</h1>
        
        <div class="boite-priorites">
            <h2>🔥 Priorités du Jour</h2>
            <ul id="liste-priorites"></ul>
        </div>

        <div class="boite-spectacles">
            <h2>📅 Calendrier des Spectacles 2026</h2>
            <div id="liste-spectacles"></div>
        </div>
    </div>

    <script src="priorites.js"></script>
    <script src="spectacles.js"></script>

    <script>
        function verifierMdp() {
            if(document.getElementById('pwd').value === 'Tjrsuhit2026') {
                document.getElementById('ecran-mdp').style.display = 'none';
                document.getElementById('contenu-principal').style.display = 'block';
                afficherTout();
            } else {
                alert('Mot de passe incorrect');
            }
        }

        function afficherTout() {
            // Affichage Priorités
            const ulPri = document.getElementById('liste-priorites');
            if (typeof mesPriorites !== 'undefined') {
                mesPriorites.forEach(p => {
                    let li = document.createElement('li');
                    li.textContent = p;
                    ulPri.appendChild(li);
                });
            } else { ulPri.innerHTML = "<li>Fichier priorites.js manquant.</li>"; }

            // Affichage Spectacles
            const divSpec = document.getElementById('liste-spectacles');
            if (typeof mesSpectacles !== 'undefined') {
                for (const [mois, shows] of Object.entries(mesSpectacles)) {
                    let divMois = document.createElement('div');
                    divMois.innerHTML = `<h3>${mois}</h3>`;
                    let ul = document.createElement('ul');
                    shows.forEach(s => {
                        let li = document.createElement('li');
                        li.textContent = s;
                        ul.appendChild(li);
                    });
                    divMois.appendChild(ul);
                    divSpec.appendChild(divMois);
                }
            } else { divSpec.innerHTML = "<p>Fichier spectacles.js manquant.</p>"; }
        }
    </script>
</body>
</html>
