<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rouge - Toujours un hit</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #eef2f5; padding: 20px; margin: 0; color: #333; }
        
        /* --- CONNEXION --- */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #d32f2f; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; transition: 0.5s; }
        .login-box { background: rgba(0,0,0,0.1); padding: 40px; border-radius: 15px; text-align: center; width: 320px; }
        #passInput { width: 100%; padding: 15px; font-size: 18px; border: none; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; text-align: center; outline: none; }
        #btnEntrer { background: white; color: #d32f2f; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; }

        /* --- LAYOUT --- */
        .dashboard-layout { display: flex; flex-wrap: wrap; gap: 30px; max-width: 1300px; margin: 0 auto; }
        
        .priorities-panel { flex: 1 1 350px; background: #d32f2f; padding: 30px; border-radius: 15px; color: white; min-height: 80vh; }
        .priority-main-title { font-size: 1.4em; font-weight: 900; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 15px; margin-bottom: 20px; }
        .day-title { font-size: 1em; font-weight: 900; text-transform: uppercase; margin-top: 25px; margin-bottom: 10px; }
        .priority-item { background: rgba(255,255,255,0.15); padding: 15px; margin-bottom: 10px; border-radius: 10px; font-weight: 600; }

        .shows-panel { flex: 2 1 600px; display: flex; flex-direction: column; gap: 20px; }
        .search-box { background: white; padding: 30px; border-radius: 15px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { text-transform: uppercase; font-weight: 900; margin: 0; }
        .slogan { color: #d32f2f; font-weight: bold; font-style: italic; margin: 5px 0 20px 0; }

        /* BARRE DE RECHERCHE ARRONDIE */
        input#searchBar { width: 100%; padding: 18px 30px; font-size: 17px; border: 2px solid #eee; border-radius: 50px; outline: none; background: #fcfcfc; }
        input#searchBar:focus { border-color: #d32f2f; background: #fff; }

        #resultArea { text-align: left; background: #fff; padding: 25px; border-radius: 12px; border: 1px solid #eee; display: none; margin-top: 20px; }
        .artist-name { font-size: 1.8em; font-weight: 900; border-bottom: 5px solid #d32f2f; padding-bottom: 5px; margin-bottom: 15px; text-transform: uppercase; }

        /* BOUTONS */
        .btn-container { display: flex; gap: 10px; margin-top: 20px; }
        .btn-action { flex: 1; padding: 12px; text-align: center; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 0.9em; border: 2px solid transparent; }
        .btn-ticketmaster { background: #fff; color: #d32f2f; border-color: #d32f2f; }
        .btn-google { background: #4285F4; color: white; }
        .btn-news { background: #f1f3f4; color: #3c4043; border-color: #dadce0; }

        /* GRILLE GROS SHOWS */
        .shows-box { background: white; padding: 30px; border-radius: 15px; }
        .grid-shows { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .auto-card { padding: 15px; border-radius: 10px; border-left: 5px solid #d32f2f; background: #fcfcfc; border: 1px solid #f0f0f0; border-left: 5px solid #d32f2f; }
        .auto-card.bell { border-left-color: #fbc02d; background: #fffde7; }
        .auto-artist { font-weight: 900; text-transform: uppercase; }
        .auto-date { color: #d32f2f; font-weight: bold; font-size: 0.9em; }

        @media (max-width: 800px) { .grid-shows { grid-template-columns: 1fr; } .btn-container { flex-direction: column; } }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <img src="https://upload.wikimedia.org/wikipedia/fr/a/a2/Rouge_FM_%28logo%29.svg" alt="Rouge FM" style="height:60px; margin-bottom:20px;">
        <input type="password" id="passInput" placeholder="Mot de passe..." onkeypress="if(event.key === 'Enter') verifier()">
        <button id="btnEntrer" onclick="verifier()">DÉVERROUILLER</button>
    </div>
</div>

<div class="dashboard-layout">
    <div class="priorities-panel">
        <h2 class="priority-main-title">🎙️ Priorités Rouge</h2>
        <div id="prioritesContainer"></div>
    </div>

    <div class="shows-panel">
        <div class="search-box">
            <h1>Calendrier des spectacles</h1>
            <p class="slogan">Toujours un hit</p>
            <input type="text" id="searchBar" placeholder="Rechercher un artiste..." onkeyup="recherche()">
            <div id="resultArea"></div>
        </div>
        <div class="shows-box">
            <h2 style="text-transform:uppercase; border-bottom:2px solid #000; padding-bottom:10px;">🎟️ Gros événements</h2>
            <div class="grid-shows" id="gridShows"></div>
        </div>
    </div>
</div>

<script src="priorites.js"></script>
<script src="spectacles.js"></script>

<script>
    function verifier() {
        if(document.getElementById('passInput').value === "Toujoursunhit2026") {
            document.getElementById('login-screen').style.display = 'none';
            initialiser();
        }
    }

    function initialiser() {
        // Priorités
        const cont = document.getElementById('prioritesContainer');
        const jours = ["dimanche", "lundi", "mardi", "mercredi", "jeudi", "vendredi", "samedi"];
        const d = new Date();
        const indices = [d.getDay(), (d.getDay()+1)%7, (d.getDay()+2)%7];
        const labels = ["Aujourd'hui", "Demain", "À venir"];
        let hP = "";
        indices.forEach((idx, i) => {
            hP += `<div class="day-title">${labels[i]} (${jours[idx]})</div>`;
            (prioritesSemaine[jours[idx]] || []).forEach(p => hP += `<div class="priority-item">${p}</div>`);
        });
        cont.innerHTML = hP;

        // Gros Shows
        const g = document.getElementById('gridShows');
        let hG = "";
        baseDeDonnees.forEach(a => {
            (a.majeurs || []).forEach(m => {
                hG += `<div class="auto-card ${m.salle.toLowerCase().includes('bell')?'bell':''}">
                    <div class="auto-artist">${a.nom}</div>
                    <div class="auto-date">${m.date}</div>
                    <div class="auto-venue">${m.salle}</div>
                </div>`;
            });
        });
        g.innerHTML = hG;
    }

    function recherche() {
        const q = document.getElementById('searchBar').value.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        const res = document.getElementById('resultArea');
        if(q.length < 2) { res.style.display='none'; return; }
        const a = baseDeDonnees.find(art => art.nom.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").includes(q));
        if(a) {
            res.style.display='block';
            let h = `<div class="artist-name">${a.nom}</div>`;
            (a.prochains || []).forEach(s => h += `<div style="margin-bottom:10px;"><b>${s.date}</b><br>${s.salle}</div>`);
            const n = encodeURIComponent(a.nom);
            h += `<div class="btn-container">
                <a href="https://www.ticketmaster.ca/search?q=${n}" target="_blank" class="btn-action btn-ticketmaster">🎟️ Billets</a>
                <a href="https://www.google.com/search?q=${n}+concert+Québec" target="_blank" class="btn-action btn-google">🔍 Google</a>
                <a href="https://news.google.com/search?q=${n}&hl=fr-CA" target="_blank" class="btn-action btn-news">📰 Actus</a>
            </div>`;
            res.innerHTML = h;
        }
    }
</script>
</body>
</html>
