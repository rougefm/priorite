<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rouge - Toujours un hit</title>
    <style>
        :root {
            --rouge-rouge: #d32f2f;
            --fond-gris: #eef2f5;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--fond-gris); 
            padding: 0; 
            margin: 0; 
            color: #333; 
            display: flex;
            min-height: 100vh;
        }
        
        /* --- ÉCRAN DE CONNEXION --- */
        #login-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--rouge-rouge); z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: white; transition: 0.5s; 
        }
        .login-box { background: rgba(0,0,0,0.1); padding: 40px; border-radius: 15px; text-align: center; width: 320px; }
        #passInput { width: 100%; padding: 15px; font-size: 18px; border: none; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; text-align: center; outline: none; }
        #btnEntrer { background: white; color: var(--rouge-rouge); border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; }

        /* --- LAYOUT GLOBAL --- */
        .sidebar { 
            width: 380px; 
            background: var(--rouge-rouge); 
            color: white; 
            padding: 40px 30px; 
            box-sizing: border-box;
            box-shadow: 4px 0 15px rgba(0,0,0,0.1);
        }

        .main-content { 
            flex: 1; 
            padding: 40px; 
            display: flex; 
            flex-direction: column; 
            gap: 30px;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* --- SIDEBAR (PRIORITÉS) --- */
        .priority-main-title { 
            font-size: 1.5em; font-weight: 900; text-transform: uppercase; 
            border-bottom: 2px solid rgba(255,255,255,0.3); 
            padding-bottom: 15px; margin-bottom: 30px;
            display: flex; align-items: center; gap: 10px;
        }
        .day-title { font-size: 1.1em; font-weight: 900; text-transform: uppercase; margin-top: 35px; margin-bottom: 15px; }
        .day-title:first-of-type { margin-top: 0; }
        .priority-item { 
            background: rgba(255,255,255,0.15); 
            padding: 18px; margin-bottom: 12px; 
            border-radius: 12px; font-size: 1.1em; font-weight: 600; line-height: 1.4; 
        }

        /* --- BLOCS BLANCS --- */
        .white-card { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.04); 
        }

        /* RECHERCHE */
        .search-header { text-align: center; margin-bottom: 30px; }
        .search-header h1 { font-size: 2.2em; font-weight: 900; text-transform: uppercase; margin: 0; color: #000; letter-spacing: -1px; }
        .search-header .slogan { color: var(--rouge-rouge); font-weight: bold; font-style: italic; font-size: 1.2em; margin-top: 5px; }
        .ia-warning { font-size: 0.9em; color: #999; font-style: italic; margin-top: 10px; }

        input#searchBar { 
            width: 100%; padding: 20px 35px; font-size: 18px; 
            border: 2px solid #eee; border-radius: 60px; 
            outline: none; box-sizing: border-box; background: #fafafa;
            transition: 0.2s;
        }
        input#searchBar:focus { border-color: var(--rouge-rouge); background: #fff; box-shadow: 0 0 15px rgba(211,47,47,0.1); }

        /* RÉSULTATS */
        #resultArea { margin-top: 25px; border-top: 1px solid #eee; padding-top: 25px; display: none; }
        .artist-title { font-size: 2.2em; font-weight: 900; text-transform: uppercase; border-bottom: 6px solid var(--rouge-rouge); padding-bottom: 10px; margin-bottom: 20px; }
        .section-label { font-size: 0.9em; text-transform: uppercase; color: #888; font-weight: 800; margin: 25px 0 15px 0; border-left: 5px solid var(--rouge-rouge); padding-left: 12px; }
        
        /* GRILLE ÉVÉNEMENTS */
        .grid-shows { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 20px; }
        .card { 
            background: #fcfcfc; padding: 20px; border-radius: 12px; 
            border: 1px solid #f0f0f0; border-left: 6px solid var(--rouge-rouge); 
            display: flex; flex-direction: column; gap: 5px;
        }
        .card.bell { border-left-color: #fbc02d; background: #fffdf0; }
        .card-artist { font-weight: 900; font-size: 1.2em; text-transform: uppercase; color: #000; }
        .card-date { font-weight: 800; color: var(--rouge-rouge); font-size: 1em; }
        .card.bell .card-date { color: #ef6c00; }
        .card-venue { font-size: 0.9em; color: #666; font-weight: 500; }

        /* BOUTONS ACTIONS */
        .btn-row { display: flex; gap: 12px; margin-top: 30px; }
        .btn { 
            flex: 1; padding: 15px; text-align: center; border-radius: 12px; 
            text-decoration: none; font-weight: 800; font-size: 0.95em; 
            transition: 0.2s; border: 2px solid transparent; 
        }
        .btn-ticket { border-color: var(--rouge-rouge); color: var(--rouge-rouge); }
        .btn-ticket:hover { background: var(--rouge-rouge); color: white; }
        .btn-google { background: #4285F4; color: white; }
        .btn-news { background: #f1f3f4; color: #3c4043; border-color: #dadce0; }

        @media (max-width: 1000px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; min-height: auto; }
            .grid-shows { grid-template-columns: 1fr; }
            .btn-row { flex-direction: column; }
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <img src="https://upload.wikimedia.org/wikipedia/fr/a/a2/Rouge_FM_%28logo%29.svg" alt="Rouge FM" style="height:70px; margin-bottom:30px;">
        <input type="password" id="passInput" placeholder="Mot de passe..." onkeypress="if(event.key === 'Enter') login()">
        <button id="btnEntrer" onclick="login()">DÉVERROUILLER</button>
    </div>
</div>

<div class="sidebar">
    <h2 class="priority-main-title">🎙️ Priorités Rouge</h2>
    <div id="prioritesContainer"></div>
</div>

<div class="main-content">
    <div class="white-card">
        <div class="search-header">
            <h1>Calendrier des spectacles</h1>
            <p class="slogan">Toujours un hit</p>
            <p class="ia-warning">⚠️ Attention, ce tableau est généré par l'IA.</p>
        </div>
        <input type="text" id="searchBar" placeholder="Rechercher un artiste de notre répertoire..." onkeyup="faireRecherche()">
        
        <div id="resultArea">
            <!-- Résultats ici -->
        </div>
    </div>

    <div class="white-card">
        <h2 style="text-transform: uppercase; font-weight: 900; margin-top: 0; display: flex; align-items: center; gap: 10px;">
            🎟️ Gros événements à venir
        </h2>
        <div style="height: 2px; background: #000; margin-bottom: 25px;"></div>
        <div class="grid-shows" id="homeGrid">
            <!-- Rempli dynamiquement -->
        </div>
    </div>
</div>

<script src="priorites.js"></script>
<script src="spectacles.js"></script>

<script>
    const MOT_DE_PASSE = "Toujoursunhit2026";

    // Gestion de la session pour éviter le rafraîchissement constant
    if(localStorage.getItem('rouge_auth') === 'true') {
        document.getElementById('login-screen').style.display = 'none';
        window.onload = init;
    }

    function login() {
        if(document.getElementById('passInput').value === MOT_DE_PASSE) {
            localStorage.setItem('rouge_auth', 'true');
            document.getElementById('login-screen').style.display = 'none';
            init();
        }
    }

    function init() {
        if (typeof prioritesSemaine !== 'undefined') {
            const container = document.getElementById('prioritesContainer');
            const jours = ["dimanche", "lundi", "mardi", "mercredi", "jeudi", "vendredi", "samedi"];
            const d = new Date();
            const sequence = [d.getDay(), (d.getDay()+1)%7, (d.getDay()+2)%7];
            const labels = ["Aujourd'hui", "Demain", "À venir"];
            
            let html = "";
            sequence.forEach((idx, i) => {
                const nomJ = jours[idx];
                html += `<div class="day-title">${labels[i]} (${nomJ})</div>`;
                const items = prioritesSemaine[nomJ] || [];
                if(items.length > 0) {
                    items.forEach(p => html += `<div class="priority-item">${p}</div>`);
                } else {
                    html += `<p style="opacity:0.6; font-style:italic;">Aucune priorité.</p>`;
                }
            });
            container.innerHTML = html;
        }

        if (typeof baseDeDonnees !== 'undefined') {
            const grid = document.getElementById('homeGrid');
            let htmlGrid = "";
            baseDeDonnees.forEach(a => {
                if(a.majeurs && a.majeurs.length > 0) {
                    a.majeurs.forEach(m => {
                        const isBell = m.salle.toLowerCase().includes("bell");
                        htmlGrid += `
                            <div class="card ${isBell ? 'bell' : ''}">
                                <div class="card-artist">${a.nom}</div>
                                <div class="card-date">${m.date}</div>
                                <div class="card-venue">${m.salle}</div>
                            </div>`;
                    });
                }
            });
            grid.innerHTML = htmlGrid;
        }
    }

    function cleanup(t) { return t.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim(); }

    function faireRecherche() {
        const val = document.getElementById('searchBar').value;
        const q = cleanup(val);
        const res = document.getElementById('resultArea');
        
        if (q.length < 2) { res.style.display = 'none'; return; }
        
        if (typeof baseDeDonnees === 'undefined') {
            res.style.display = 'block';
            res.innerHTML = `<p style="color:red; text-align:center;">Erreur : base de données introuvable.</p>`;
            return;
        }

        const artiste = baseDeDonnees.find(art => cleanup(art.nom).includes(q));

        if (artiste) {
            res.style.display = 'block';
            let h = `<div class="artist-title">${artiste.nom}</div>`;
            
            if(artiste.prochains && artiste.prochains.length > 0) {
                h += `<div class="section-label">📅 Prochaines dates</div>`;
                artiste.prochains.forEach(s => h += `<div class="card"><b>${s.date}</b><span>${s.salle}</span></div>`);
            }
            
            if(artiste.majeurs && artiste.majeurs.length > 0) {
                h += `<div class="section-label">⭐ Événement majeur</div>`;
                artiste.majeurs.forEach(s => h += `<div class="card bell"><b>${s.date}</b><span>${s.salle}</span></div>`);
            }

            const enc = encodeURIComponent(artiste.nom);
            h += `
                <div class="btn-row">
                    <a href="https://www.ticketmaster.ca/search?q=${enc}" target="_blank" class="btn btn-ticket">🎟️ Billets</a>
                    <a href="https://www.google.com/search?q=spectacle+${enc}+Québec" target="_blank" class="btn btn-google">🔍 Recherche</a>
                    <a href="https://news.google.com/search?q=${enc}&hl=fr-CA" target="_blank" class="btn btn-news">📰 Actus</a>
                </div>`;
            res.innerHTML = h;
        } else {
            res.innerHTML = `<p style="text-align:center; color:#d32f2f; font-weight:bold; margin-top:20px;">Artiste non trouvé.</p>`;
        }
    }
</script>
</body>
</html>
