<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rouge - Toujours un hit</title>
    <style>
        :root {
            --rouge-rouge: #d32f2f;
            --fond-gris: #eef2f5;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--fond-gris); 
            padding: 0; 
            margin: 0; 
            color: #333; 
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* --- ÉCRAN DE CONNEXION --- */
        #login-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--rouge-rouge); z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: white; 
        }
        .login-box { background: rgba(0,0,0,0.1); padding: 40px; border-radius: 15px; text-align: center; width: 320px; }
        #passInput { width: 100%; padding: 15px; font-size: 18px; border: none; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; text-align: center; outline: none; }
        #btnEntrer { background: white; color: var(--rouge-rouge); border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; transition: 0.2s;}
        #btnEntrer:hover { background: #f0f0f0; transform: scale(1.02); }

        /* --- BARRES LATÉRALES (SIDEBARS UNIFIÉES EN ROUGE) --- */
        .sidebar { 
            width: 320px; 
            background: var(--rouge-rouge); 
            color: white; 
            padding: 30px; 
            box-sizing: border-box;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

        .side-title { 
            font-size: 1.3em; font-weight: 900; text-transform: uppercase; 
            border-bottom: 2px solid rgba(255,255,255,0.3); 
            padding-bottom: 15px; margin-bottom: 25px;
            display: flex; align-items: center; gap: 10px;
        }
        
        .day-group-title { 
            font-size: 0.9em; font-weight: 900; text-transform: uppercase; 
            margin-top: 30px; margin-bottom: 12px; 
            opacity: 0.9;
        }
        .day-group-title:first-of-type { margin-top: 0; }

        .side-item { 
            background: rgba(255,255,255,0.15); 
            padding: 15px; margin-bottom: 10px; 
            border-radius: 10px; font-size: 1em; font-weight: 600; line-height: 1.4; 
        }

        /* --- CONTENU CENTRAL --- */
        .main-content { 
            flex: 1; 
            padding: 30px; 
            display: flex; 
            flex-direction: column; 
            gap: 25px;
            min-width: 500px;
        }

        .white-card { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }

        /* RECHERCHE */
        .search-header { text-align: center; margin-bottom: 20px; }
        .search-header h1 { font-size: 1.8em; font-weight: 900; text-transform: uppercase; margin: 0; color: #000; }
        .search-header .slogan { color: var(--rouge-rouge); font-weight: bold; font-style: italic; font-size: 1.1em; margin: 5px 0; }
        .ia-warning { font-size: 0.8em; color: #999; font-style: italic; }

        input#searchBar { 
            width: 100%; padding: 16px 25px; font-size: 16px; 
            border: 2px solid #f0f0f0; border-radius: 50px; 
            outline: none; box-sizing: border-box; background: #fafafa;
            transition: 0.2s;
        }
        input#searchBar:focus { border-color: var(--rouge-rouge); background: #fff; box-shadow: 0 0 10px rgba(211,47,47,0.1); }

        /* RÉSULTATS */
        #resultArea { margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; display: none; }
        .artist-title { font-size: 1.8em; font-weight: 900; text-transform: uppercase; border-bottom: 5px solid var(--rouge-rouge); padding-bottom: 8px; margin-bottom: 15px; }
        .section-label { font-size: 0.8em; text-transform: uppercase; color: #888; font-weight: 800; margin: 15px 0 10px 0; border-left: 4px solid var(--rouge-rouge); padding-left: 10px; }

        /* GRILLE SPECTACLES */
        .grid-shows { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; margin-top: 15px; }
        .card { 
            background: #fcfcfc; padding: 15px; border-radius: 12px; 
            border: 1px solid #f0f0f0; border-left: 6px solid var(--rouge-rouge); 
            display: flex; flex-direction: column; gap: 4px;
        }
        .card.bell { border-left-color: #fbc02d; background: #fffdf2; }
        .card-artist { font-weight: 900; font-size: 1.05em; text-transform: uppercase; color: #000; }
        .card-date { font-weight: 700; color: var(--rouge-rouge); font-size: 0.9em; }
        .card.bell .card-date { color: #ef6c00; }
        .card-venue { font-size: 0.8em; color: #666; }

        /* BOUTONS ACTIONS */
        .btn-row { display: flex; gap: 8px; margin-top: 20px; }
        .btn { 
            flex: 1; padding: 10px; text-align: center; border-radius: 10px; 
            text-decoration: none; font-weight: 800; font-size: 0.85em; 
            transition: 0.2s; border: 2px solid transparent; 
        }
        .btn-ticket { border-color: var(--rouge-rouge); color: var(--rouge-rouge); }
        .btn-ticket:hover { background: var(--rouge-rouge); color: white; }
        .btn-google { background: #4285F4; color: white; }
        .btn-news { background: #f1f3f4; color: #3c4043; border-color: #dadce0; }

        @media (max-width: 1200px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; }
            .main-content { min-width: auto; }
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <img src="https://upload.wikimedia.org/wikipedia/fr/a/a2/Rouge_FM_%28logo%29.svg" alt="Rouge FM" style="height:60px; margin-bottom:25px;">
        <input type="password" id="passInput" placeholder="Mot de passe..." onkeypress="if(event.key === 'Enter') login()">
        <button id="btnEntrer" onclick="login()">DÉVERROUILLER</button>
    </div>
</div>

<!-- BARRE LATÉRALE GAUCHE : PRIORITÉS -->
<div class="sidebar">
    <h2 class="side-title">🎙️ Priorités</h2>
    <div id="prioritesContainer"></div>
</div>

<!-- CONTENU CENTRAL -->
<div class="main-content">
    <div class="white-card">
        <div class="search-header">
            <h1>Calendrier des spectacles</h1>
            <p class="slogan">Toujours un hit</p>
            <p class="ia-warning">⚠️ Attention, ce tableau est généré par l'IA.</p>
        </div>
        <input type="text" id="searchBar" placeholder="Rechercher un artiste de notre répertoire..." onkeyup="faireRecherche()">
        <div id="resultArea"></div>
    </div>

    <div class="white-card">
        <h2 style="text-transform: uppercase; font-weight: 900; margin: 0; font-size: 1.1em; display: flex; align-items: center; gap: 10px;">
            🎟️ Événements à venir
        </h2>
        <div style="height: 1px; background: #eee; margin: 15px 0;"></div>
        <div class="grid-shows" id="homeGrid"></div>
    </div>
</div>

<!-- BARRE LATÉRALE DROITE : JOURNÉES -->
<div class="sidebar">
    <h2 class="side-title">🌍 Journées</h2>
    <div id="journeesContainer"></div>
</div>

<script src="priorites.js"></script>
<script src="spectacles.js"></script>
<script src="journees.js"></script>

<script>
    const MOT_DE_PASSE_STUDIO = "Toujoursunhit2026";

    if(localStorage.getItem('rouge_auth_success') === 'vrai') {
        document.getElementById('login-screen').style.display = 'none';
        attendreEtInitialiser();
    }

    function login() {
        if(document.getElementById('passInput').value === MOT_DE_PASSE_STUDIO) {
            localStorage.setItem('rouge_auth_success', 'vrai');
            document.getElementById('login-screen').style.display = 'none';
            initialiserContenu();
        } else {
            alert("Mot de passe incorrect.");
        }
    }

    function attendreEtInitialiser() {
        if (typeof baseDeDonnees !== 'undefined' && typeof prioritesSemaine !== 'undefined' && typeof journeesMondiales !== 'undefined') {
            initialiserContenu();
        } else {
            setTimeout(attendreEtInitialiser, 50);
        }
    }

    function parseRougeDate(str) {
        const moisMap = {
            "janvier": 0, "fevrier": 1, "mars": 2, "avril": 3, "mai": 4, "juin": 5,
            "juillet": 6, "aout": 7, "septembre": 8, "octobre": 9, "novembre": 10, "decembre": 11
        };
        const s = str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        const yearMatch = s.match(/\d{4}/);
        const year = yearMatch ? parseInt(yearMatch[0]) : new Date().getFullYear();
        let month = 0;
        for (let m in moisMap) { if (s.includes(m)) { month = moisMap[m]; break; } }
        const days = s.match(/\d+/g);
        let day = 1;
        if (days) {
            const filteredDays = days.filter(d => d.length < 3);
            if (filteredDays.length > 0) day = parseInt(filteredDays[filteredDays.length - 1]);
        }
        return new Date(year, month, day);
    }

    function initialiserContenu() {
        const joursNom = ["dimanche", "lundi", "mardi", "mercredi", "jeudi", "vendredi", "samedi"];
        const d = new Date();
        const sequenceIdx = [d.getDay(), (d.getDay()+1)%7, (d.getDay()+2)%7];
        const labels = ["Aujourd'hui", "Demain", "À venir"];

        // 1. Priorités (Basé sur le jour de la semaine)
        const contPrio = document.getElementById('prioritesContainer');
        if (typeof prioritesSemaine !== 'undefined') {
            let htmlP = "";
            sequenceIdx.forEach((idx, i) => {
                const nomJ = joursNom[idx];
                htmlP += `<div class="day-group-title">${labels[i]} (${nomJ.toUpperCase()})</div>`;
                const list = prioritesSemaine[nomJ] || [];
                if(list.length > 0) { list.forEach(p => htmlP += `<div class="side-item">${p}</div>`); }
                else { htmlP += `<p style="opacity:0.6; font-style:italic; font-size:0.85em;">Aucune priorité.</p>`; }
            });
            contPrio.innerHTML = htmlP;
        }

        // 2. Journées Mondiales (Automatique par date calendaire)
        const contJournees = document.getElementById('journeesContainer');
        if (typeof journeesMondiales !== 'undefined') {
            let htmlJ = "";
            
            for(let i=0; i<3; i++) {
                const targetDate = new Date();
                targetDate.setDate(d.getDate() + i);
                
                // Formater en JJ-MM (ex: 20-03)
                const dd = String(targetDate.getDate()).padStart(2, '0');
                const mm = String(targetDate.getMonth() + 1).padStart(2, '0');
                const key = `${dd}-${mm}`;
                
                const nomDuJour = joursNom[targetDate.getDay()];
                const dateAffiche = targetDate.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long' });

                htmlJ += `<div class="day-group-title">${labels[i]} (${nomDuJour.toUpperCase()})<br><small style="opacity:0.7">${dateAffiche}</small></div>`;
                
                const list = journeesMondiales[key] || [];
                if(list.length > 0) {
                    list.forEach(j => htmlJ += `<div class="side-item">${j}</div>`);
                } else {
                    htmlJ += `<p style="opacity:0.6; font-style:italic; font-size:0.85em;">Rien de spécial.</p>`;
                }
            }
            contJournees.innerHTML = htmlJ;
        }

        // 3. Grille d'accueil (Spectacles chronologiques)
        const grid = document.getElementById('homeGrid');
        if (typeof baseDeDonnees !== 'undefined') {
            const today = new Date();
            today.setHours(0,0,0,0);
            let allMajeurs = [];
            baseDeDonnees.forEach(a => {
                if(a.majeurs && a.majeurs.length > 0) {
                    a.majeurs.forEach(m => {
                        const dateObj = parseRougeDate(m.date);
                        if (dateObj >= today) {
                            allMajeurs.push({ artist: a.nom, date: m.date, salle: m.salle, dateObj: dateObj });
                        }
                    });
                }
            });
            allMajeurs.sort((a, b) => a.dateObj - b.dateObj);
            let htmlG = "";
            allMajeurs.forEach(item => {
                const isBell = item.salle.toLowerCase().includes("bell");
                htmlG += `
                    <div class="card ${isBell ? 'bell' : ''}">
                        <div class="card-artist">${item.artist}</div>
                        <div class="card-date">${item.date}</div>
                        <div class="card-venue">${item.salle}</div>
                    </div>`;
            });
            grid.innerHTML = htmlG || "<p style='color:#999'>Aucun événement majeur à venir.</p>";
        }
    }

    function clean(t) { return t.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim(); }

    function faireRecherche() {
        const val = document.getElementById('searchBar').value;
        const q = clean(val);
        const res = document.getElementById('resultArea');
        if (q.length < 2) { res.style.display = 'none'; return; }
        if (typeof baseDeDonnees === 'undefined') return;
        const artiste = baseDeDonnees.find(art => clean(art.nom).includes(q));
        if (artiste) {
            res.style.display = 'block';
            let h = `<div class="artist-title">${artiste.nom}</div>`;
            const today = new Date();
            today.setHours(0,0,0,0);
            const shows = [...(artiste.prochains || []), ...(artiste.majeurs || [])];
            const upcoming = shows.filter(s => parseRougeDate(s.date) >= today);
            upcoming.sort((a, b) => parseRougeDate(a.date) - parseRougeDate(b.date));
            if(upcoming.length > 0) {
                h += `<div class="section-label">📅 Prochaines dates</div>`;
                upcoming.forEach(s => {
                    const isMajeur = artiste.majeurs && artiste.majeurs.includes(s);
                    h += `<div class="card ${isMajeur ? 'bell' : ''}"><b>${s.date}</b><span>${s.salle}</span></div>`;
                });
            } else { h += `<p style="font-style:italic; color:#888; margin-top:10px;">Aucune date à venir.</p>`; }
            const enc = encodeURIComponent(artiste.nom);
            h += `<div class="btn-row">
                    <a href="https://www.ticketmaster.ca/search?q=${enc}" target="_blank" class="btn btn-ticket">🎟️ Billets</a>
                    <a href="https://www.google.com/search?q=spectacle+${enc}+Québec" target="_blank" class="btn btn-google">🔍 Recherche</a>
                    <a href="https://news.google.com/search?q=${enc}&hl=fr-CA&gl=CA&ceid=CA:fr" target="_blank" class="btn btn-news">📰 Actus</a>
                </div>`;
            res.innerHTML = h;
        } else {
            res.innerHTML = `<p style="text-align:center; color:var(--rouge-rouge); font-weight:bold; margin-top:20px;">Artiste non trouvé.</p>`;
        }
    }
</script>
</body>
</html>
