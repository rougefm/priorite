<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Rouge FM</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #eef2f5; padding: 20px; margin: 0; color: #333; }
        
        /* --- ÉCRAN MOT DE PASSE --- */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #d32f2f; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; transition: opacity 0.5s; }
        #login-screen img { max-height: 80px; margin-bottom: 20px; }
        .login-box { background: rgba(0,0,0,0.1); padding: 40px; border-radius: 15px; text-align: center; }
        .login-box h2 { margin-top: 0; text-transform: uppercase; letter-spacing: 1px; }
        #passInput { width: 100%; padding: 15px; font-size: 18px; margin-top: 20px; border: none; border-radius: 8px; text-align: center; outline: none; }
        #btnEntrer { margin-top: 20px; padding: 12px 30px; font-size: 16px; font-weight: bold; color: #d32f2f; background: white; border: none; border-radius: 8px; cursor: pointer; }

        /* --- CONTENEUR PRINCIPAL (UNE SEULE COLONNE ÉPURÉE) --- */
        #main-content { display: none; max-width: 850px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .header { text-align: center; margin-bottom: 35px; border-bottom: 2px solid #eee; padding-bottom: 20px; }
        .header img { height: 45px; margin-bottom: 10px; }
        .header h1 { margin: 0; font-size: 26px; color: #333; }

        /* --- SECTION PRIORITÉS --- */
        .section-priorites { margin-bottom: 40px; }
        .section-priorites h2 { color: #d32f2f; border-bottom: 2px solid #d32f2f; padding-bottom: 5px; font-size: 22px; margin-top: 0; text-transform: capitalize; }
        .priority-list { list-style: none; padding: 0; margin: 0; }
        .priority-list li { background: #fdf2f2; padding: 15px; margin-top: 10px; border-radius: 8px; border-left: 4px solid #d32f2f; font-size: 16px; line-height: 1.4; }

        /* --- SECTION RECHERCHE --- */
        .section-recherche h2 { color: #d32f2f; border-bottom: 2px solid #d32f2f; padding-bottom: 5px; font-size: 22px; margin-top: 0; }
        #searchInput { width: 100%; padding: 16px; font-size: 18px; border: 2px solid #e0e0e0; border-radius: 8px; box-sizing: border-box; outline: none; margin-top: 10px; margin-bottom: 20px; transition: 0.2s; }
        #searchInput:focus { border-color: #d32f2f; }
        
        /* --- RÉSULTATS DE RECHERCHE --- */
        .result-box { padding: 20px; border-radius: 8px; background: #f9f9f9; min-height: 120px; border: 1px solid #eee; }
        .result-box h3 { margin-top: 0; color: #333; font-size: 24px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        
        .info-card { background: #e3f2fd; padding: 12px; border-radius: 6px; border-left: 4px solid #2196f3; margin-bottom: 20px; font-size: 15px; color: #0d47a1; }
        
        .section-title { font-weight: bold; color: #888; margin: 20px 0 10px 0; text-transform: uppercase; font-size: 13px; letter-spacing: 1px; }
        
        .show-card { background: white; padding: 15px; border-radius: 6px; border: 1px solid #e0e0e0; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .show-card.highlight { border-left: 4px solid #ff9800; background: #fffcf5; }
        .show-date { font-weight: bold; color: #d32f2f; font-size: 16px; }
        .show-venue { color: #555; font-size: 16px; }

        .btn-container { display: flex; gap: 15px; margin-top: 30px; }
        .btn-action { flex: 1; padding: 14px; text-align: center; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 15px; transition: 0.2s; }
        .btn-ticketmaster { background: #026cdf; color: white; }
        .btn-google { background: #fff; color: #333; border: 1px solid #ccc; }
        .btn-action:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e0/Rouge_FM.svg" alt="Rouge FM" onerror="this.src='https://via.placeholder.com/150x50/d32f2f/ffffff?text=ROUGE'">
            <h2>Outil Animateurs</h2>
            <input type="password" id="passInput" placeholder="Mot de passe">
            <button id="btnEntrer" onclick="checkPassword()">Connexion</button>
        </div>
    </div>

    <div id="main-content">
        <div class="header">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e0/Rouge_FM.svg" alt="Rouge FM" onerror="this.src='https://via.placeholder.com/150x50/ffffff/d32f2f?text=ROUGE'">
            <h1>Informations & Spectacles</h1>
        </div>

        <div class="section-priorites">
            <h2 id="titre-priorites">📌 Priorités du jour</h2>
            <ul class="priority-list" id="priorityContainer"></ul>
        </div>

        <div class="section-recherche">
            <h2>🔍 Recherche Artiste</h2>
            <input type="text" id="searchInput" placeholder="Tapez un nom d'artiste (ex: Charlotte Cardin)..." autocomplete="off">
            
            <div class="result-box" id="resultContainer">
                <p style="color:#888; text-align:center; margin-top:30px; font-size: 16px;">Commencez à taper un nom pour voir les infos et les spectacles.</p>
            </div>
        </div>
    </div>

    <script src="priorites.js"></script>
    <script src="spectacles.js"></script>
    
    <script>
        const PWD = "Toujoursunhit2026";
        const input = document.getElementById("passInput");
        
        input.addEventListener("keypress", function(event) { if (event.key === "Enter") checkPassword(); });

        function checkPassword() {
            if(input.value === PWD) {
                document.getElementById('login-screen').style.opacity = "0";
                setTimeout(() => {
                    document.getElementById('login-screen').style.display = "none";
                    document.getElementById('main-content').style.display = "block";
                    chargerPriorites();
                }, 400);
            } else {
                alert("Mot de passe incorrect");
            }
        }

        function chargerPriorites() {
            const container = document.getElementById('priorityContainer');
            container.innerHTML = "";
            
            const jours = ["dimanche", "lundi", "mardi", "mercredi", "jeudi", "vendredi", "samedi"];
            const jourActuel = jours[new Date().getDay()]; 
            
            document.getElementById('titre-priorites').innerText = "📌 Priorités du " + jourActuel;

            if (typeof prioritesSemaine !== 'undefined' && prioritesSemaine[jourActuel]) {
                prioritesSemaine[jourActuel].forEach(texte => {
                    let li = document.createElement("li");
                    li.innerHTML = texte;
                    container.appendChild(li);
                });
            } else {
                container.innerHTML = "<li>Aucune priorité enregistrée pour aujourd'hui.</li>";
            }
        }

        function enleverAccents(str) {
            return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
        }

        document.getElementById('searchInput').addEventListener('input', function(e) {
            const query = enleverAccents(e.target.value.trim());
            const resultDiv = document.getElementById('resultContainer');
            
            if (query.length < 2) {
                resultDiv.innerHTML = `<p style="color:#888; text-align:center; margin-top:30px; font-size: 16px;">Commencez à taper un nom...</p>`;
                return;
            }

            // Gère le nom de ta variable dans spectacles.js (baseArtistes ou baseDeDonnees)
            const dataBase = typeof baseArtistes !== 'undefined' ? baseArtistes : (typeof baseDeDonnees !== 'undefined' ? baseDeDonnees : null);

            if (!dataBase) {
                resultDiv.innerHTML = `<p style="color:red; text-align:center;">Erreur: Impossible de lire le fichier spectacles.js.</p>`;
                return;
            }

            const artisteTrouve = dataBase.find(a => enleverAccents(a.nom).includes(query));

            if (artisteTrouve) {
                let html = `<h3>${artisteTrouve.nom}</h3>`;
                
                if (artisteTrouve.info && artisteTrouve.info.trim() !== "") {
                    html += `<div class="info-card">🎙️ <b>Info Rouge :</b> ${artisteTrouve.info}</div>`;
                }

                const showsLocaux = artisteTrouve.prochains || [];
                const showsMajeurs = artisteTrouve.majeurs || [];

                if (showsLocaux.length > 0) {
                    html += `<div class="section-title">📍 En région / Locaux</div>`;
                    showsLocaux.forEach(show => { html += `<div class="show-card"><div class="show-date">${show.date}</div><div class="show-venue">${show.salle}</div></div>`; });
                } else if (showsMajeurs.length === 0) {
                    html += `<p style="color:#888; font-style:italic; margin: 20px 0;">Aucune date confirmée au système.</p>`;
                }

                if (showsMajeurs.length > 0) {
                    html += `<div class="section-title">⭐ Événements majeurs</div>`;
                    showsMajeurs.forEach(show => { html += `<div class="show-card highlight"><div class="show-date">${show.date}</div><div class="show-venue">${show.salle}</div></div>`; });
                }

                const nomPourTicketmaster = encodeURIComponent(enleverAccents(artisteTrouve.nom));
                const nomPourGoogle = encodeURIComponent(artisteTrouve.nom);
                
                html += `
                    <div class="btn-container">
                        <a href="https://www.ticketmaster.ca/search?q=${nomPourTicketmaster}" target="_blank" class="btn-action btn-ticketmaster">🎟️ Billets</a>
                        <a href="https://www.google.com/search?q=billets+spectacle+${nomPourGoogle}+Montréal+Québec" target="_blank" class="btn-action btn-google">🔍 Google</a>
                    </div>
                `;
                resultDiv.innerHTML = html;
            } else {
                resultDiv.innerHTML = `<p style="color:#d32f2f; text-align:center; margin-top:30px;">Aucun artiste trouvé pour "${e.target.value}".</p>`;
            }
        });
    </script>
</body>
</html>
