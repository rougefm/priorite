<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rouge - Toujours un hit</title>
    <style>
        :root {
            --rouge-rouge: #d32f2f;
            --fond-gris: #eef2f5;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--fond-gris); 
            padding: 0; 
            margin: 0; 
            color: #333; 
            display: flex;
            min-height: 100vh;
            width: 100vw;
            overflow-x: auto;
        }
        
        /* --- CONNEXION --- */
        #login-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--rouge-rouge); z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: white; 
        }
        .login-box { background: rgba(0,0,0,0.1); padding: 40px; border-radius: 15px; text-align: center; width: 320px; }
        #passInput { width: 100%; padding: 15px; font-size: 18px; border: none; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; text-align: center; outline: none; }
        #btnEntrer { background: white; color: var(--rouge-rouge); border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; transition: 0.2s;}

        /* --- BARRES LATÉRALES (SIDEBARS ROUGES) --- */
        .sidebar { 
            width: 320px; 
            background: var(--rouge-rouge); 
            color: white; 
            padding: 25px; 
            box-sizing: border-box;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            flex-shrink: 0; 
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: sticky;
            top: 0;
            overflow-y: auto;
        }

        .side-title { 
            font-size: 1.25em; font-weight: 900; text-transform: uppercase; 
            border-bottom: 2px solid rgba(255,255,255,0.3); 
            padding-bottom: 15px; margin-bottom: 20px;
            display: flex; align-items: center; gap: 10px;
        }
        
        .day-group-title { 
            font-size: 0.85em; font-weight: 900; text-transform: uppercase; 
            margin-top: 25px; margin-bottom: 10px; 
            opacity: 0.9;
        }
        .day-group-title:first-of-type { margin-top: 0; }

        .side-item { 
            background: rgba(255,255,255,0.15); 
            padding: 12px; margin-bottom: 8px; 
            border-radius: 10px; font-size: 1em; font-weight: 600; line-height: 1.4; 
        }

        /* --- CONTENU CENTRAL --- */
        .main-content { 
            flex: 1; 
            padding: 30px; 
            display: flex; 
            flex-direction: column; 
            gap: 25px;
            min-width: 500px;
        }

        .white-card { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }

        /* RECHERCHE */
        .search-header { text-align: center; margin-bottom: 20px; }
        .search-header h1 { font-size: 1.8em; font-weight: 900; text-transform: uppercase; margin: 0; color: #000; }
        .search-header .slogan { color: var(--rouge-rouge); font-weight: bold; font-style: italic; font-size: 1.1em; margin: 5px 0; }
        
        input#searchBar { 
            width: 100%; padding: 16px 25px; font-size: 16px; 
            border: 2px solid #f0f0f0; border-radius: 50px; 
            outline: none; box-sizing: border-box; background: #fafafa;
            transition: 0.2s;
        }
        input#searchBar:focus { border-color: var(--rouge-rouge); background: #fff; box-shadow: 0 0 10px rgba(211,47,47,0.1); }

        /* RÉSULTATS */
        #resultArea { margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; display: none; }
        .artist-title { font-size: 1.8em; font-weight: 900; text-transform: uppercase; border-bottom: 5px solid var(--rouge-rouge); padding-bottom: 8px; margin-bottom: 15px; }
        .section-label { font-size: 0.8em; text-transform: uppercase; color: #888; font-weight: 800; margin: 15px 0 10px 0; border-left: 4px solid var(--rouge-rouge); padding-left: 10px; }

        /* GRILLE SPECTACLES */
        .grid-shows { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; margin-top: 15px; }
        .card { 
            background: #fcfcfc; padding: 15px; border-radius: 12px; 
            border: 1px solid #f0f0f0; border-left: 6px solid var(--rouge-rouge); 
            display: flex; flex-direction: column; gap: 4px;
        }
        .card.bell { border-left-color: #fbc02d; background: #fffdf2; }
        .card-artist { font-weight: 900; font-size: 1.05em; text-transform: uppercase; color: #000; }
        .card-date { font-weight: 700; color: var(--rouge-rouge); font-size: 0.9em; }
        .card.bell .card-date { color: #ef6c00; }
        .card-venue { font-size: 0.8em; color: #666; }

        @media (max-width: 1200px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: static; }
            .main-content { min-width: auto; }
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <img src="https://upload.wikimedia.org/wikipedia/fr/a/a2/Rouge_FM_%28logo%29.svg" alt="Rouge FM" style="height:60px; margin-bottom:25px;">
        <input type="password" id="passInput" placeholder="Mot de passe..." onkeypress="if(event.key === 'Enter') login()">
        <button id="btnEntrer" onclick="login()">DÉVERROUILLER</button>
    </div>
</div>

<div class="sidebar">
    <h2 class="side-title">🎙️ Priorités</h2>
    <div id="prioritesContainer"></div>
</div>

<div class="main-content">
    <div class="white-card">
        <div class="search-header">
            <h1>Calendrier des spectacles</h1>
            <p class="slogan">Toujours un hit</p>
        </div>
        <input type="text" id="searchBar" placeholder="Rechercher un artiste..." onkeyup="faireRecherche()">
        <div id="resultArea"></div>
    </div>

    <div class="white-card">
        <h2 style="text-transform: uppercase; font-weight: 900; margin: 0; font-size: 1.1em; display: flex; align-items: center; gap: 10px;">
            🎟️ Astuce
        </h2>
        <div style="height: 1px; background: #eee; margin: 15px 0;"></div>
        <div class="grid-shows" id="homeGrid"></div>
    </div>
</div>

<div class="sidebar">
    <h2 class="side-title">🌍 Journées</h2>
    <div id="journeesContainer"></div>
</div>

<script src="priorites.js"></script>
<script src="journees.js"></script>

<script>
    const MOT_DE_PASSE = "Toujoursunhit2026";

    if(localStorage.getItem('rouge_auth_v5') === 'vrai') {
        document.getElementById('login-screen').style.display = 'none';
        attendreDonnees();
    }

    function login() {
        if(document.getElementById('passInput').value === MOT_DE_PASSE) {
            localStorage.setItem('rouge_auth_v5', 'vrai');
            document.getElementById('login-screen').style.display = 'none';
            initialiserContenu();
        } else { alert("Incorrect."); }
    }

    function attendreDonnees() {
        if (typeof prioritesSemaine !== 'undefined' && typeof journeesMondiales !== 'undefined') {
            initialiserContenu();
        } else {
            setTimeout(attendreDonnees, 50);
        }
    }

    function initialiserContenu() {
        const joursNom = ["dimanche", "lundi", "mardi", "mercredi", "jeudi", "vendredi", "samedi"];
        const d = new Date();
        d.setHours(0,0,0,0);

        // 1. Priorités
        const contPrio = document.getElementById('prioritesContainer');
        const seqP = [d.getDay(), (d.getDay()+1)%7, (d.getDay()+2)%7];
        const labsP = ["Aujourd'hui", "Demain", "À venir"];
        contPrio.innerHTML = seqP.map((idx, i) => `
            <div class="day-group-title">${labsP[i]} (${joursNom[idx].toUpperCase()})</div>
            ${(prioritesSemaine[joursNom[idx]] || ["Aucune priorité"]).map(p => `<div class="side-item">${p}</div>`).join('')}
        `).join('');

        // 2. Journées
        const contJour = document.getElementById('journeesContainer');
        let hJ = ""; let found = 0; let offset = 0;
        while (found < 6 && offset < 365) {
            const t = new Date(); t.setDate(d.getDate() + offset);
            const key = `${String(t.getDate()).padStart(2,'0')}-${String(t.getMonth()+1).padStart(2,'0')}`;
            const list = journeesMondiales[key] || [];
            if (list.length > 0) {
                const dA = t.toLocaleDateString('fr-FR', { day:'numeric', month:'long' });
                let label = offset === 0 ? "Aujourd'hui" : (offset === 1 ? "Demain" : joursNom[t.getDay()]);
                hJ += `<div class="day-group-title">${label.toUpperCase()}<br><small style="opacity:0.7">${dA}</small></div>`;
                list.forEach(j => { hJ += `<div class="side-item">${j}</div>`; found++; });
            }
            offset++;
        }
        contJour.innerHTML = hJ || "<p style='opacity:0.5'>Rien à signaler.</p>";

        // 3. Grille (Vide par défaut, utilise la recherche)
        const grid = document.getElementById('homeGrid');
        grid.innerHTML = "<p style='color:#999'>Recherchez un artiste plus haut pour voir toutes ses dates de tournée et son actualité en temps réel !</p>";
    }

    function cleanup(t) { return t.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim(); }

    // --- FONCTIONS POUR L'API ET LA GÉOLOCALISATION ---

    function calculerDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; 
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    async function faireRecherche() {
        const inputValeur = document.getElementById('searchBar').value.trim();
        const q = cleanup(inputValeur);
        const res = document.getElementById('resultArea');
        
        if (q.length < 2) { res.style.display = 'none'; return; }
        
        res.style.display = 'block';
        res.innerHTML = "<p style='text-align:center; color:#888;'>Recherche en cours sur le web... 📡</p>";

        const nomRecherche = inputValeur;
        const enc = encodeURIComponent(nomRecherche);

        try {
            // Utilisation du proxy public pour contourner les bloqueurs et les erreurs de fichiers locaux
            const urlBandsintown = `https://rest.bandsintown.com/artists/${enc}/events?app_id=rouge_fm_test`;
            const urlProxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(urlBandsintown)}`;

            const reponseAPI = await fetch(urlProxy);
            
            if (!reponseAPI.ok) {
                throw new Error(`Le serveur a refusé l'accès (Code d'erreur: ${reponseAPI.status})`);
            }

            const evenements = await reponseAPI.json();

            let h = `<div class="artist-title">${nomRecherche}</div>`;

            if (!Array.isArray(evenements) || evenements.length === 0) {
                h += `<p style='color:#666; font-style:italic;'>Aucune date de tournée annoncée pour le moment.</p>`;
            } else {
                const MTL_LAT = 45.5017;
                const MTL_LON = -73.5673;

                let grandMontreal = [], canada = [], monde = [];

                evenements.sort((a, b) => new Date(a.datetime) - new Date(b.datetime));

                evenements.forEach(ev => {
                    const lat = parseFloat(ev.venue.latitude);
                    const lon = parseFloat(ev.venue.longitude);
                    let distance = 99999; 
                    if (!isNaN(lat) && !isNaN(lon)) distance = calculerDistance(MTL_LAT, MTL_LON, lat, lon);

                    if (distance <= 30) grandMontreal.push(ev);
                    else if (ev.venue.country === "Canada") canada.push(ev);
                    else monde.push(ev);
                });

                const genererSection = (titre, liste) => {
                    if (liste.length === 0) return "";
                    let html = `<div class="section-label">📅 ${titre}</div>`;
                    liste.forEach(s => {
                        const d = new Date(s.datetime);
                        const dateFormatee = d.toLocaleDateString('fr-CA', { day: 'numeric', month: 'long', year: 'numeric' });
                        const estCentreBell = s.venue.name.toLowerCase().includes("bell") ? 'bell' : '';
                        html += `<div class="card ${estCentreBell}"><b>${dateFormatee}</b><span>${s.venue.name}, ${s.venue.city}</span></div>`;
                    });
                    return html;
                };

                h += genererSection("Grand Montréal (Moins de 30 km)", grandMontreal);
                h += genererSection("Ailleurs au Canada", canada);
                h += genererSection("International", monde);
            }

            h += `<div class="btn-row" style="display:flex; gap:10px; margin-top:15px;">
                <a href="https://www.ticketmaster.ca/search?q=${enc}" target="_blank" style="flex:1; padding:10px; text-align:center; border-radius:8px; border:2px solid var(--rouge-rouge); color:var(--rouge-rouge); text-decoration:none; font-weight:800;">🎟️ Billets</a>
                <a href="https://news.google.com/search?q=${enc}&hl=fr-CA&gl=CA&ceid=CA%3Afr" target="_blank" style="flex:1; padding:10px; text-align:center; border-radius:8px; background:#4285F4; color:white; text-decoration:none; font-weight:800;">📰 Actualités</a>
            </div>`;
            
            res.innerHTML = h;

        } catch (erreur) {
            console.error("Détail de l'erreur :", erreur);
            let hErreur = `<div class="artist-title">${nomRecherche}</div>`;
            
            hErreur += `<p style='text-align:center; color:var(--rouge-rouge); font-weight:bold;'>Erreur technique: ${erreur.message}</p>`;
            hErreur += `<p style='text-align:center; font-size:0.9em; color:#666;'>Astuce: Si vous utilisez un bloqueur de publicité (comme AdBlock), essayez de le désactiver pour ce site.</p>`;
            
            hErreur += `<div class="btn-row" style="display:flex; gap:10px; margin-top:15px;">
                <a href="https://www.ticketmaster.ca/search?q=${enc}" target="_blank" style="flex:1; padding:10px; text-align:center; border-radius:8px; border:2px solid var(--rouge-rouge); color:var(--rouge-rouge); text-decoration:none; font-weight:800;">🎟️ Billets</a>
                <a href="https://news.google.com/search?q=${enc}&hl=fr-CA&gl=CA&ceid=CA%3Afr" target="_blank" style="flex:1; padding:10px; text-align:center; border-radius:8px; background:#4285F4; color:white; text-decoration:none; font-weight:800;">📰 Actualités</a>
            </div>`;
            res.innerHTML = hErreur;
        }
    }
</script>
</body>
</html>
